<body>
<script src="assets/common.js"></script>

<header>
  <h1>⚡ Hash<span>Tool</span></h1>
  <div class="controls">
    <button id="theme" title="Theme: auto / light / dark">🌓</button>
    <button id="file">📂 Hash a file</button>
  </div>
</header>
<input type="file" id="filePick" hidden>

<div class="pane" style="margin-bottom:16px">
  <div class="pane-header">
    <span>Input text</span>
    <span class="status" id="status"></span>
  </div>
  <textarea id="input" placeholder="Type or paste text — hashes update live. Or pick a file / drop one anywhere." spellcheck="false"></textarea>
</div>

<div class="card"><table class="kv" id="out"></table></div>

<p class="hint">Everything is computed locally (Web Crypto + a small MD5 implementation) · MD5 and SHA-1 are shown for checksums/compatibility only — do not use them for passwords or signatures</p>
<div id="toast"></div>

<script>
"use strict";

// ---------- MD5 (not in Web Crypto; compact standard implementation) ----------

const MD5_S = [7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,
               5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,
               4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,
               6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
const MD5_K = new Uint32Array(64);
for (let i = 0; i < 64; i++) MD5_K[i] = Math.floor(Math.abs(Math.sin(i + 1)) * 2 ** 32);

function md5Hex(bytes) {
  const bitLen = bytes.length * 8;
  const padded = new Uint8Array((((bytes.length + 8) >> 6) + 1) << 6);
  padded.set(bytes);
  padded[bytes.length] = 0x80;
  const dv = new DataView(padded.buffer);
  dv.setUint32(padded.length - 8, bitLen >>> 0, true);
  dv.setUint32(padded.length - 4, Math.floor(bitLen / 2 ** 32), true);

  let a0 = 0x67452301, b0 = 0xefcdab89, c0 = 0x98badcfe, d0 = 0x10325476;
  for (let off = 0; off < padded.length; off += 64) {
    let A = a0, B = b0, C = c0, D = d0;
    for (let i = 0; i < 64; i++) {
      let F, g;
      if (i < 16)      { F = (B & C) | (~B & D); g = i; }
      else if (i < 32) { F = (D & B) | (~D & C); g = (5 * i + 1) % 16; }
      else if (i < 48) { F = B ^ C ^ D;          g = (3 * i + 5) % 16; }
      else             { F = C ^ (B | ~D);       g = (7 * i) % 16; }
      F = (F + A + MD5_K[i] + dv.getUint32(off + g * 4, true)) >>> 0;
      A = D; D = C; C = B;
      B = (B + ((F << MD5_S[i]) | (F >>> (32 - MD5_S[i])))) >>> 0;
    }
    a0 = (a0 + A) >>> 0; b0 = (b0 + B) >>> 0; c0 = (c0 + C) >>> 0; d0 = (d0 + D) >>> 0;
  }
  const out = new DataView(new ArrayBuffer(16));
  out.setUint32(0, a0, true); out.setUint32(4, b0, true);
  out.setUint32(8, c0, true); out.setUint32(12, d0, true);
  return hex(new Uint8Array(out.buffer));
}

// ---------- SHA via Web Crypto ----------

function hex(bytes) {
  return [...bytes].map(b => b.toString(16).padStart(2, "0")).join("");
}

async function shaHex(algo, bytes) {
  return hex(new Uint8Array(await crypto.subtle.digest(algo, bytes)));
}

// ---------- UI ----------

const ALGOS = ["MD5", "SHA-1", "SHA-256", "SHA-384", "SHA-512"];

async function compute(bytes, label) {
  setStatus($("status"), `hashing ${label} (${bytes.length.toLocaleString()} bytes)…`);
  const results = await Promise.all([
    Promise.resolve(md5Hex(bytes)),
    shaHex("SHA-1", bytes),
    shaHex("SHA-256", bytes),
    shaHex("SHA-384", bytes),
    shaHex("SHA-512", bytes),
  ]);
  $("out").innerHTML = ALGOS.map((name, i) =>
    `<tr><td class="k">${name}</td><td class="v">${results[i]}` +
    `<button class="mini" data-copy="${results[i]}" title="Copy">📋</button></td></tr>`
  ).join("");
  setStatus($("status"), `${label} · ${bytes.length.toLocaleString()} bytes`, "ok");
}

let timer;
$("input").addEventListener("input", () => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    compute(new TextEncoder().encode($("input").value), "text");
  }, 200);
});

function hashFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    $("input").value = `(file) ${file.name}`;
    compute(new Uint8Array(reader.result), file.name);
  };
  reader.readAsArrayBuffer(file);
}

$("file").addEventListener("click", () => $("filePick").click());
$("filePick").addEventListener("change", (e) => {
  if (e.target.files[0]) hashFile(e.target.files[0]);
  e.target.value = "";
});
document.addEventListener("dragover", (e) => e.preventDefault());
document.addEventListener("drop", (e) => {
  e.preventDefault();
  if (e.dataTransfer.files[0]) hashFile(e.dataTransfer.files[0]);
});

document.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-copy]");
  if (btn) copyText(btn.dataset.copy, "Hash copied");
});

compute(new Uint8Array(0), "empty input");
</script>
</body>
</html>
