<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug Hunt — Snake break game for tired programmers</title>
<meta name="description" content="A tiny Snake game: eat the bugs, don't crash the build. Take a break. Runs offline in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wahyuakbarwibowo.github.io/diff/game.html">
<meta property="og:site_name" content="DevTools">
<meta property="og:title" content="DevTools — Bug Hunt">
<meta property="og:description" content="A tiny Snake game: eat the bugs, don't crash the build. Take a break. Runs offline in your browser.">
<meta property="og:image" content="https://wahyuakbarwibowo.github.io/diff/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="DevTools — Bug Hunt">
<meta name="twitter:description" content="A tiny Snake game: eat the bugs, don't crash the build. Take a break. Runs offline in your browser.">
<meta name="twitter:image" content="https://wahyuakbarwibowo.github.io/diff/assets/og.png">
<meta name="theme-color" content="#0d1117">
<link rel="stylesheet" href="assets/common.css">
<style>
  .game-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #board {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-width: 100%;
    height: auto;
    touch-action: none;
  }
  .scores { display: flex; gap: 24px; font-family: var(--mono); color: var(--muted); }
  .scores b { color: var(--text); }
</style>
</head>
<body>
<script src="assets/common.js"></script>

<header>
  <h1>🐛 Bug<span>Hunt</span></h1>
  <div class="controls">
    <button id="theme" title="Theme: auto / light / dark">🌓</button>
    <button id="start" class="primary">▶ Start</button>
  </div>
</header>

<div class="card game-wrap">
  <div class="scores">
    <span>Bugs squashed: <b id="score">0</b></span>
    <span>High score: <b id="high">0</b></span>
  </div>
  <canvas id="board" width="480" height="480"></canvas>
</div>

<p class="hint">You are the merge queue. Eat 🐛 to grow, hit a wall or yourself and the build breaks. Arrows / WASD / hjkl to steer · Space to pause · swipe on touch screens</p>
<div id="toast"></div>

<script>
"use strict";

const CELL = 24, N = 20; // 20×20 grid on a 480px canvas
const board = $("board"), ctx = board.getContext("2d");
const HIGH_KEY = "bughunt-high";

let snake, dir, nextDir, bug, score, timer = null, paused = false;
let high = +localStorage.getItem(HIGH_KEY) || 0;
$("high").textContent = high;

function css(name) { return getComputedStyle(document.body).getPropertyValue(name).trim(); }

function placeBug() {
  do {
    bug = { x: Math.floor(Math.random() * N), y: Math.floor(Math.random() * N) };
  } while (snake.some(s => s.x === bug.x && s.y === bug.y));
}

function reset() {
  snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
  dir = nextDir = { x: 1, y: 0 };
  score = 0;
  paused = false;
  $("score").textContent = "0";
  placeBug();
}

function speed() { return Math.max(60, 140 - score * 4); } // faster as you eat

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  const hitWall = head.x < 0 || head.y < 0 || head.x >= N || head.y >= N;
  if (hitWall || snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
  snake.unshift(head);
  if (head.x === bug.x && head.y === bug.y) {
    score++;
    $("score").textContent = score;
    placeBug();
    clearInterval(timer);
    timer = setInterval(tick, speed());
  } else {
    snake.pop();
  }
  draw();
}

function draw(overlayText) {
  ctx.clearRect(0, 0, board.width, board.height);
  // faint grid
  ctx.strokeStyle = css("--border");
  ctx.globalAlpha = 0.35;
  for (let i = 1; i < N; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, board.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(board.width, i * CELL); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // bug
  ctx.font = `${CELL - 4}px serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🐛", bug.x * CELL + CELL / 2, bug.y * CELL + CELL / 2 + 1);
  // snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? css("--ok") : css("--accent");
    ctx.beginPath();
    ctx.roundRect(s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4, 6);
    ctx.fill();
  });
  if (overlayText) {
    ctx.fillStyle = css("--bg");
    ctx.globalAlpha = 0.75;
    ctx.fillRect(0, 0, board.width, board.height);
    ctx.globalAlpha = 1;
    ctx.fillStyle = css("--text");
    ctx.font = `bold 26px ${css("--mono")}`;
    ctx.fillText(overlayText, board.width / 2, board.height / 2);
  }
}

function gameOver() {
  clearInterval(timer);
  timer = null;
  if (score > high) {
    high = score;
    localStorage.setItem(HIGH_KEY, high);
    $("high").textContent = high;
    toast("New high score! 🏆");
  }
  draw("💥 build failed — " + score + " bugs");
  $("start").textContent = "↻ Restart";
}

function start() {
  clearInterval(timer);
  reset();
  draw();
  timer = setInterval(tick, speed());
  $("start").textContent = "↻ Restart";
}

function togglePause() {
  if (!timer && !paused) return;
  paused = !paused;
  if (paused) { clearInterval(timer); timer = null; draw("⏸ paused"); }
  else { draw(); timer = setInterval(tick, speed()); }
}

function steer(x, y) {
  if (x === -dir.x && y === -dir.y) return; // no 180° into yourself
  nextDir = { x, y };
}

const KEYS = {
  ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
  w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
  k: [0, -1], j: [0, 1], h: [-1, 0], l: [1, 0],
};

document.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === " ") { e.preventDefault(); return togglePause(); }
  const k = KEYS[e.key];
  if (!k) return;
  e.preventDefault();
  if (!timer && !paused) return start();
  steer(k[0], k[1]);
});

// swipe controls
let touch = null;
board.addEventListener("touchstart", (e) => { touch = e.touches[0]; }, { passive: true });
board.addEventListener("touchend", (e) => {
  if (!touch) return;
  const dx = e.changedTouches[0].clientX - touch.clientX;
  const dy = e.changedTouches[0].clientY - touch.clientY;
  touch = null;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return togglePause();
  if (!timer && !paused) return start();
  if (Math.abs(dx) > Math.abs(dy)) steer(Math.sign(dx), 0);
  else steer(0, Math.sign(dy));
});

$("start").addEventListener("click", start);

reset();
draw("press an arrow key or tap to start");
</script>
</body>
</html>
