<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP Status Quiz — do you know your status codes?</title>
<meta name="description" content="Quiz yourself on HTTP status codes and build a streak. Runs offline in your browser.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wahyuakbarwibowo.github.io/diff/httpquiz.html">
<meta property="og:site_name" content="DevTools">
<meta property="og:title" content="DevTools — HTTP Status Quiz">
<meta property="og:description" content="Quiz yourself on HTTP status codes and build a streak.">
<meta property="og:image" content="https://wahyuakbarwibowo.github.io/diff/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="DevTools — HTTP Status Quiz">
<meta name="twitter:description" content="Quiz yourself on HTTP status codes.">
<meta name="twitter:image" content="https://wahyuakbarwibowo.github.io/diff/assets/og.png">
<meta name="theme-color" content="#0d1117">
<link rel="stylesheet" href="assets/common.css">
<style>
  .quiz { max-width: 560px; margin: 0 auto; text-align: center; }
  .code { font-family: var(--mono); font-size: 72px; font-weight: 700; color: var(--accent); margin: 10px 0 20px; }
  .choices { display: grid; gap: 10px; }
  .choices button {
    padding: 14px; font-size: 15px; text-align: left;
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  }
  .choices button:hover:not(:disabled) { border-color: var(--accent); }
  .choices button.right { border-color: var(--ok); color: var(--ok); }
  .choices button.wrongpick { border-color: var(--bad); color: var(--bad); }
  .stats { display: flex; justify-content: center; gap: 24px; font-family: var(--mono); color: var(--muted); margin-top: 18px; }
  .stats b { color: var(--text); }
</style>
</head>
<body>
<script src="assets/common.js"></script>

<header>
  <h1>🚦 HTTP<span>Quiz</span></h1>
  <div class="controls">
    <button id="theme" title="Theme: auto / light / dark">🌓</button>
  </div>
</header>

<div class="card quiz">
  <div>What does this status code mean?</div>
  <div class="code" id="code"></div>
  <div class="choices" id="choices"></div>
  <div class="stats">
    <span>Streak: <b id="streak">0</b></span>
    <span>Best streak: <b id="beststreak">0</b></span>
  </div>
</div>

<p class="hint">Press 1–4 to answer with the keyboard · a wrong answer resets the streak (like production)</p>
<div id="toast"></div>

<script>
"use strict";

const STATUSES = [
  [100, "Continue"], [101, "Switching Protocols"],
  [200, "OK"], [201, "Created"], [202, "Accepted"], [204, "No Content"],
  [206, "Partial Content"],
  [301, "Moved Permanently"], [302, "Found"], [304, "Not Modified"],
  [307, "Temporary Redirect"], [308, "Permanent Redirect"],
  [400, "Bad Request"], [401, "Unauthorized"], [402, "Payment Required"],
  [403, "Forbidden"], [404, "Not Found"], [405, "Method Not Allowed"],
  [406, "Not Acceptable"], [408, "Request Timeout"], [409, "Conflict"],
  [410, "Gone"], [413, "Payload Too Large"], [415, "Unsupported Media Type"],
  [418, "I'm a teapot"], [422, "Unprocessable Content"], [425, "Too Early"],
  [429, "Too Many Requests"], [451, "Unavailable For Legal Reasons"],
  [500, "Internal Server Error"], [501, "Not Implemented"], [502, "Bad Gateway"],
  [503, "Service Unavailable"], [504, "Gateway Timeout"],
  [505, "HTTP Version Not Supported"],
];

const BEST_KEY = "httpquiz-best";
let streak = 0, answer, locked = false;
let bestStreak = +localStorage.getItem(BEST_KEY) || 0;
$("beststreak").textContent = bestStreak;

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ask() {
  locked = false;
  answer = STATUSES[Math.floor(Math.random() * STATUSES.length)];
  const wrongs = shuffle(STATUSES.filter(s => s !== answer)).slice(0, 3);
  const options = shuffle([answer, ...wrongs]);
  $("code").textContent = answer[0];
  $("choices").innerHTML = options.map((o, i) =>
    `<button data-name="${esc(o[1])}">${i + 1}. ${esc(o[1])}</button>`).join("");
}

function pickButton(btn) {
  if (locked || !btn) return;
  locked = true;
  const right = btn.dataset.name === answer[1];
  for (const b of $("choices").children) {
    b.disabled = true;
    if (b.dataset.name === answer[1]) b.classList.add("right");
  }
  if (right) {
    streak++;
    if (streak > bestStreak) {
      bestStreak = streak;
      localStorage.setItem(BEST_KEY, bestStreak);
      $("beststreak").textContent = bestStreak;
    }
  } else {
    btn.classList.add("wrongpick");
    streak = 0;
  }
  $("streak").textContent = streak;
  setTimeout(ask, right ? 700 : 1600);
}

$("choices").addEventListener("click", (e) => pickButton(e.target.closest("button")));

document.addEventListener("keydown", (e) => {
  const i = +e.key - 1;
  if (i >= 0 && i < 4) pickButton($("choices").children[i]);
});

ask();
</script>
</body>
</html>
